                9: { milestone: 'කළලයෙන් බිළිඳෙකු වීම', length: '2.3 cm', weight: '2 g', baby: 'කළල අවධිය අවසන් වී බිළිඳු (Fetus) අවධිය ඇරඹේ. හෘදයේ කුටීර 4 නිවැරදිව ක්‍රියා කරයි.', mom: 'හෝමෝන උච්චතම අවස්ථාවට පැමිණෙන නිසා මනෝභාවයන් වෙනස් වීම (Mood Swings) බහුල වේ.', care: 'දිනපතා පිරිසිදු වතුර ලීටර් 2-3ක් පානය කර ශරීරය සජලීයව තබාගන්න.' },
                10: { milestone: 'අත්‍යවශ්‍ය අවයව සම්පූර්ණ වීම', length: '3.1 cm', weight: '4 g', baby: 'සියලුම අත්‍යවශ්‍ය අවයව (වකුගඩු, අක්මාව, බඩවැල්) වැඩී ඇත. බබා කුස තුළ ගිලීමේ චලනයන් කරයි.', mom: 'උදරයේ නහර මතු වී පෙනෙන්නට පුළුවන. වමනය ගතිය කෙමෙන් අඩු වේ.', care: 'දන්ත සෞඛ්‍යය ගැන සැලකිලිමත් වන්න. විදුරුමස් ලේ වැගිරීම් ඇත්නම් වෛද්‍යවරයකුට පෙන්වන්න.' },
                11: { milestone: 'පුංචි දත් මූල සෑදීම', length: '4.1 cm', weight: '7 g', baby: 'බබාගේ බාහිර ලිංගික අවයව සෑදීම ඇරඹේ. දත්වල මූලික සෛල විදුරුමස් ඇතුළත නිර්මාණය වේ.', mom: 'ශරීරයේ පරිවෘත්තීය ක්‍රියා වේගවත් වන නිසා අධික උණුසුමක් හෝ දහඩිය දැමීමක් දැනේ.', care: 'පෝෂ්‍යදායී සමබර ආහාර වේලක් ගන්න. කැල්සියම් අඩංගු කිරි නිෂ්පාදන වැඩිපුර ගන්න.' },
                12: { milestone: 'පළමු ත්‍රෛමාසිකයේ නිමාව', length: '5.4 cm', weight: '14 g', baby: 'පළමු ත්‍රෛමාසිකයේ අවසානයයි. බබාගේ ඇඟිලි සලකුණු (Fingerprints) පවා මේ වන විට සෑදී ඇත.', mom: 'ගබ්සා වීමේ අවදානම 65% කින් අඩු වන සන්ධිස්ථානයකි. බඩ තරමක් මතු වේ.', care: 'සති 11-14 අතර කාලයේදී කරන NT Scan පරීක්ෂණය වෛද්‍ය උපදෙස් මත සිදුකර ගන්න.' },
                13: { milestone: 'දෙවැනි ත්‍රෛමාසිකයේ ඇරඹුම', length: '7.4 cm', weight: '23 g', baby: 'දෙවැනි ත්‍රෛමාසිකය ඇරඹේ. බබාගේ මුත්‍රා පද්ධතිය වැඩ කරන අතර, ඇම්නියොටික් දියරයට මුත්‍රා පිට කරයි.', mom: 'ශක්තිමත් ගතියක් දැනේ. කෑම රුචිය වර්ධනය වන අතර උදෑසන අපහසුතා පහව යයි.', care: 'යකඩ (Iron) සහ විටමින් C බහුල ආහාර එකට ගන්න. (යකඩ පෙත්ත සමඟ දොඩම් යුෂ බොන්න)' },
                14: { milestone: 'මුහුණේ ඉරියව් වෙනස් වීම', length: '8.7 cm', weight: '43 g', baby: 'බබාගේ බෙල්ල දිගු වන අතර මුහුණේ මාංශ පේශි ක්‍රියාකාරී වේ. නළල රැලි කිරීම් සිදුවේ.', mom: 'ගර්භාෂය ශ්‍රෝණි කුහරයෙන් ඉහළට පැමිණෙන නිසා මුත්‍රා කිරීමේ තදබදය තරමක් අඩු වේ.', care: 'පහසු සැහැල්ලු ඇඳුම් (Maternity Clothes) භාවිතය ආරම්භ කරන්න.' },
                15: { milestone: 'ආලෝකය හඳුනා ගැනීම', length: '10.1 cm', weight: '70 g', baby: 'බබාගේ සම ඉතා සිහින් වන අතර රුධිර වාහිනී පෙනේ. ඇස් වසාගෙන ආලෝකය හඳුනාගත හැක.', mom: 'සමේ වර්ණක වෙනස් වීම නිසා උදරය මැද කළු ඉරක් (Linea Nigra) මතු විය හැක.', care: 'සිරුර කෙළින් තබාගෙන නිවැරදි ඉරියව්වෙන් වාඩි වීමට හා ඇවිදීමට පුරුදු වන්න.' },
                16: { milestone: 'හෘදය වේගයෙන් ක්‍රියා කිරීම', length: '11.6 cm', weight: '100 g', baby: 'බබාගේ හිස්කබලේ ඇටකටු ශක්තිමත් වේ. හෘදය දිනකට ලීටර් 25ක ලේ ප්‍රමාණයක් පොම්ප කරයි.', mom: 'දෙවැනි ප්‍රධාන ස්කෑන් පරීක්ෂණයට (Anomaly Scan) කාලය ලඟා වේ.', care: 'වෛද්‍යවරයා නියම කරන යකඩ, කැල්සියම් සහ විටමින් පෙති නොකඩවා ගන්න.' },
                17: { milestone: 'සන්ධි චලනය වීම', length: '13 cm', weight: '140 g', baby: 'බබාගේ සන්ධි චලනය කළ හැක. ශරීරයේ මේද තට්ටුවක් (Adipose Tissue) තැන්පත් වීම ඇරඹේ.', mom: 'උදරය කැසීම සහ සම ඇදීම නිසා Stretch Marks මතු වීමට පටන් ගනී.', care: 'උදරයේ සම වියළි වීම වැළැක්වීමට මොයිස්චරයිසර් ක්‍රීම් එකක් හෝ පොල්තෙල් ගාන්න.' },
                18: { milestone: 'ඔබේ ආදරණීය පැටියාගේ හඬ', length: '14.2 cm', weight: '190 g', baby: 'බබාගේ ශ්‍රවණ පද්ධතිය වැඩ කරයි. මවගේ හෘද ස්පන්දනය සහ බාහිර තද ශබ්ද බබාට ඇසේ.', mom: 'සමහර අම්මලාට බබාගේ පළමු සියුම් සෙලවීම (Quickening) සමනලයෙකු තටු ගසන්නාක් මෙන් දැනේ.', care: 'බබා සමඟ ආදරයෙන් කතා කරන්න. කුස පිරිමදිමින් සන්සුන් සංගීතයට සවන් දෙන්න.' },
                19: { milestone: 'ආරක්ෂිත ආවරණය (Vernix)', length: '15.3 cm', weight: '240 g', baby: 'බබාගේ සම ආරක්ෂා කිරීමට Vernix Caseosa නමැති සුදුවැහැති සෛල තට්ටුවකින් මුළු ඇඟම වැසේ.', mom: 'යටිබඩ හෝ ඉණ දෙපස මාංශ පේශි ඇදීම නිසා සියුම් වේදනාවක් (Round Ligament Pain) දැනේ.', care: 'එකපාරටම ඇඳෙන් නැගිටීමෙන් වළකින්න. මුලින් ඇලයට හැරී පසුව නැගිටින්න.' },
                20: { milestone: 'අර්ධ ගමනාන්තය (සති 20)', length: '25.6 cm', weight: '300 g', baby: 'ගර්භණී කාලයෙන් සති 40න් හරියටම අඩක් (සති 20) අවසන් වේ. බබාගේ ආහාර ජීර්ණ පද්ධතිය Meconium නිපදවයි.', mom: 'ගර්භාෂයේ ඉහළ සීමාව හරියටම ඔබේ බුරිය මට්ටමට පැමිණ ඇත.', care: 'සති 18-22 අතර කාලයේදී බබාගේ ව්‍යුහය බලන Anomaly Scan එක අනිවාර්යයෙන්ම කරගන්න.' },
                21: { milestone: 'නොනවත්වා දඟලන සමය', length: '26.7 cm', weight: '360 g', baby: 'බබාගේ ඇහිබැම සහ ඇහිපිහාටු හොඳින් වැඩී ඇත. කුස තුළ සිටිමින් ඇඟිලි හැපීම වැනි දේ සිදුකරයි.', mom: 'ලේ ගමනාගමනය වැඩිවීම නිසා සමහර මව්වරුන්ගේ කකුල් ඉදිමීම (Edema) ආරම්භ විය හැක.', care: 'වැඩි වේලාවක් එක දිගට හිටගෙන සිටීමෙන් වළකින්න. වාඩි වී සිටින විට කකුල් මදක් ඉහළින් තබන්න.' },
                22: { milestone: 'රස සංවේදනය දියුණු වීම', length: '27.8 cm', weight: '430 g', baby: 'ළදරුවාගේ රස සංවේදනය (Taste buds) වර්ධනය වේ. අම්මා කන කෑමවල රසය ඇම්නියොටික් දියරය හරහා බබාට දැනේ.', mom: 'සමේ ඇදීම නිසා බඩ සහ පියයුරු අවට තදින් කැසීමක් ඇතිවිය හැක.', care: 'සම කැසීම ඇති තැන්වල සබන් ගෑමෙන් වළකින්න, ඒ වෙනුවට මොයිස්චරයිසර් හෝ ඔලිව් ඔයිල් ගාන්න.' },
                23: { milestone: 'ශබ්ද පැහැදිලිව ඇසීම', length: '28.9 cm', weight: '500 g', baby: 'කන් ඇතුළත ඇති සියුම් අස්ථි සම්පූර්ණයෙන්ම ශක්තිමත් වන නිසා දැන් බබාට බාහිර ශබ්ද ඉතා පැහැදිලිව ඇසේ.', mom: 'ගර්භණී සමයේ දියවැඩියාව (Gestational Diabetes) ඇත්දැයි බැලීමට සායනයෙන් පරීක්ෂණ සිදුකරයි.', care: 'සීනි සහ පිෂ්ඨය අධික කෑම පාලනය කරන්න. වෛද්‍ය උපදෙස් මත OGTT පරීක්ෂණය කරගන්න.' },
                24: { milestone: 'නින්ද සහ අවදිවීමේ රටාව', length: '30 cm', weight: '600 g', baby: 'පෙනහළු ඇතුළත වාතය රඳවා ගන්නා Surfactant නමැති ද්‍රව්‍යය නිපදවීම ඇරඹේ. බබා නිදාගන්නා සහ අවදිවන වේලාවන් රටාවකට සිදුවේ.', mom: 'ගර්භාෂය ඉහළට තල්ලු වන නිසා පපුවේ දැවිල්ල (Heartburn) සහ ඇසිඩ් ගතිය ඇතිවිය හැක.', care: 'එකවර විශාල ආහාර වේල් ගැනීම වෙනුවට කුඩා ආහාර වේල් කිහිපයකට කන්න. කෑ සැනින් නිදාගන්න එපා.' },
                25: { milestone: 'රෝස පැහැති සම', length: '34.6 cm', weight: '660 g', baby: 'බබාගේ සම යට කේශනාලිකා සෑදෙන නිසා සම රෝස පැහැයක් ගනී. කොන්ද කෙළින් තබාගැනීමේ හැකියාව ලැබේ.', mom: 'කොන්දේ කැක්කුම (Back pain) බහුලව ඇතිවිය හැක. ශරීරයේ බර කේන්ද්‍රය වෙනස් වීම මෙයට හේතුවයි.', care: 'බිම වැටුණු දේ ඇහිදීමේදී කොන්ද නමා නැමෙන්නේ නැතිව, දණහිස් නමා වාඩි වී ඇහිදින්න.' },
                26: { milestone: 'පළමු වරට ඇස් ඇරීම', length: '35.6 cm', weight: '760 g', baby: 'බබා පළමු වරට ඇස් ඇරීම සිදුකරයි! ශබ්ද ඇසෙන විට හෘද ස්පන්දන වේගය වැඩිවන බව නිරීක්ෂණය කළ හැක.', mom: 'ගර්භාෂය පෙනහළු තද කරන නිසා සුළු වශයෙන් හුස්ම ගැනීමේ අපහසුවක් (Shortness of breath) දැනේ.', care: 'හුස්ම ගැනීමේ අපහසුවක් දැනෙන විට කෙළින් වාඩි වී දිගු හුස්ම (Deep breathing) ගන්න.' },
                27: { milestone: 'මොළයේ වේගවත් වර්ධනය', length: '36.6 cm', weight: '875 g', baby: 'දෙවැනි ත්‍රෛමාසිකයේ අවසාන සතියයි. බබාගේ මොළයේ වර්ධනය ඉතා වේගවත් වන අතර නින්දේදී හීන පවා පෙනේ.', mom: 'රාත්‍රී කාලයේදී කෙණ්ඩ පෙරලීම (Leg cramps) සහ නිදි වැරීම බහුලව සිදුවිය හැක.', care: 'කෙණ්ඩ පෙරලෙන විට පාදය ඉදිරියට දිගු කර ඇඟිලි උඩට නමා සම්බාහනය කරන්න. කැල්සියම් ආහාර ගන්න.' },
                28: { milestone: 'තුන්වැනි ත්‍රෛමාසිකයේ ඇරඹුම', length: '37.6 cm', weight: '1 kg', baby: 'තුන්වැනි ත්‍රෛමාසිකය ඇරඹේ! බබාගේ ඇස්වල කාච සම්පූර්ණ වේ. බබා දඟලන වාර ගණන හොඳින් දැනේ.', mom: 'සායන පොතට අනුව බබා දඟලන වාර ගණන (Kick Counts) දිනපතා සටහන් කිරීම ඇරඹිය යුතුය.', care: 'දිනපතා උදේ 9 සිට රෑ 9 දක්වා පැය 12 තුළ බබා අවම 10 වතාවක් දඟලනවාදැයි අපේ Kick Counter එකෙන් මනින්න.' },
                29: { milestone: 'අස්ථි ශක්තිමත් වීම', length: '38.6 cm', weight: '1.2 kg', baby: 'බබාගේ අස්ථි පද්ධතිය වේගයෙන් කැල්සියම් උරාගනිමින් ශක්තිමත් වේ. මාංශ පේශි වර්ධනය වේ.', mom: 'උදරය විශාල වීම නිසා රෑට නින්ද යාම අපහසු වේ. වම් ඇලයට හැරී නිදාගැනීම අනිවාර්ය වේ.', care: 'නිදාගන්නා විට බඩ යටින් සහ කකුල් දෙක මැදින් කොට්ට තබා (Pregnancy pillow style) පහසුව සලසා ගන්න.' },
                30: { milestone: 'රතු රුධිර සෛල නිපදවීම', length: '39.9 cm', weight: '1.3 kg', baby: 'බබාගේ ඇටමිදුළු (Bone marrow) මගින් රතු රුධිර සෛල නිපදවීම සම්පූර්ණයෙන්ම බාරගනී. හිසකෙස් බහුලව වැඩේ.', mom: 'ශරීරයේ බර වැඩිවීම නිසා ඉක්මනින් මහන්සි ගතිය දැනේ. මනස නොසන්සුන් වීම සිදුවිය හැක.', care: 'මානසික ආතතිය අඩු කරගැනීමට අපේ සංගීත පිටුවෙන් "භාවනා තනු" සහ "අංගුලිමාල පිරිත" ශ්‍රවණය කරන්න.' },
                31: { milestone: 'මුත්‍රාශය ක්‍රියාකාරී වීම', length: '41.1 cm', weight: '1.5 kg', baby: 'බබාගේ මුත්‍රාශය හොඳින් වැඩ කරයි. දිනකට ඇම්නියොටික් දියර ලීටර් භාගයක් පමණ බබා පෙරා පිට කරයි.', mom: 'ගර්භාෂය මුත්‍රාශය තද කරන නිසා නැවත වතාවක් නිතර නිතර මුත්‍රා කිරීමේ අවශ්‍යතාවය මතු වේ.', care: 'මුත්‍රා ආසාදන (UTI) වැළැක්වීමට මුත්‍රා තද කරගෙන නොසිටින්න. දියර වර්ග බහුලව ගන්න.' },
                32: { milestone: 'හුස්ම ගැනීමේ පෙරහුරුව', length: '42.4 cm', weight: '1.7 kg', baby: 'බබා උපතින් පසු හුස්ම ගන්නා ආකාරය පුහුණු වීමට කුස තුළදී හුස්ම ගැනීමේ ව්‍යායාම (Practice breaths) කරයි.', mom: 'ගර්භාෂය තද වීම නිසා ඇතිවන ව්‍යාජ ප්‍රසූත වේදනා (Braxton Hicks contractions) සියුම්ව දැනේ.', care: 'උදරය තද වන විට වතුර වීදුරුවක් බොන්න, ඉරියව්ව මාරු කරන්න. වේදනාව දිගටම පවතී නම් රෝහල් ගත වන්න.' },
                33: { milestone: 'ප්‍රතිශක්තිකරණය ගලා යාම', length: '43.7 cm', weight: '1.9 kg', baby: 'බබාගේ ප්‍රතිශක්තිකරණ පද්ධතිය වර්ධනය වේ. අම්මාගේ ඇඟෙන් ප්‍රතිදේහ (Antibodies) බබාට ගලා යයි.', mom: 'බඩේ සම උපරිමයටම ඇදෙන නිසා බුරිය පිටතට නෙරා ඒම සිදුවිය හැක.', care: 'නිතර තන කිරි දීමට සූදානම් වීමක් ලෙස පියයුරු මෘදුව පිරිසිදු කරන්න.' },
                34: { milestone: 'ස්නායු පද්ධතිය සම්පූර්ණ වීම', length: '45 cm', weight: '2.1 kg', baby: 'බබාගේ ස්නායු පද්ධතිය සහ මොළය උපරිම මට්ටමට වැඩී ඇත. දැන් බබා ඇස් ඇරගෙන නිදාගැනීම සහ අවදිවීම කරයි.', mom: 'ශ්‍රෝණි අස්ථි අවට මාංශ පේශි ලිහිල් වන නිසා ඇවිදීමේදී සියුම් අපහසුතාවයක් දැනේ.', care: 'හුදකලා නොවී පවුලේ අය සමඟ සතුටින් කාලය ගත කරන්න. ප්‍රසූතිය පිළිබඳ බිය දුරු කරගන්න.' },
                35: { milestone: 'රෝහල් ගමනට සූදානම', length: '46.2 cm', weight: '2.4 kg', baby: 'කුස තුළ ඉඩකඩ මදි නිසා බබාගේ පෙරලීම් අඩු වන නමුත් අත් පා වලින් තල්ලු කිරීම් හොඳින් දැනේ.', mom: 'ප්‍රසූතිය සඳහා රෝහලට රැගෙන යන "රෝහල් බෑගය" (Hospital Bag) ලෑස්ති කර අවසන් කිරීමට හොඳම කාලයයි.', care: 'අපේ ඇප් එකේ ඇති "රෝහල් බෑගයේ සූදානම" චෙක්ලිස්ට් එක බලා බඩු බාහිරාදිය සියල්ල අසුරා ගන්න.' },
                36: { milestone: 'පහළට හැරීම (Lightening)', length: '47.4 cm', weight: '2.6 kg', baby: 'බබාගේ කන්පෙති වල කාටිලේජ හොඳින් වැඩේ. ශරීරයේ මේද තට්ටුව පිරී ඇති නිසා බබා දැන් ලස්සනට පෙනේ.', mom: 'බබා ක්‍රමයෙන් පහළට හැරීම (Lightening) සිදුවේ. පපුවේ දැවිල්ල අඩු වන නමුත් ඇවිදීම අපහසු වේ.', care: 'සතිපතා පවත්වන සායන (Weekly Clinics) සඳහා මඟ හැරීමකින් තොරව සහභාගී වන්න.' },

                                                const message = encodeURIComponent("Mother's Assistant PRO: මම රු. 99/- බැංකු ගිණුමට තැන්පත් කළා. මෙන්න ගෙවීම් රිසිට්පත.");
                                                window.open(`https://wa.me/94774206088?text=${message}`, '_blank');
                                            }}
                                            className="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-black py-2.5 rounded-xl shadow-sm transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-xs select-none"
                                        >
                                            <i className="fa-brands fa-whatsapp text-sm"></i> රිසිට්පත එවන්න (WhatsApp)
                                        </button>

                                        {/* 🔒 Security Privacy Note */}
                                        <p className="text-[10px] text-brand-slate font-medium text-center bg-gray-50 p-2 rounded-xl border border-gray-100 leading-normal">
                                            🔒 අපි ඔබගේ කාඩ්පත් විස්තර කිසිවක් ලබා නොගන්නා අතර, මෙම ගෙවීම සම්පූර්ණයෙන්ම සුරක්ෂිත බැංකු තැන්පතු ක්‍රමවේදයකි.
                                        </p>

                                        {/* 🔑 DYNAMIC DAILY PROMO CODE UNLOCK BOX */}
                                        <div className="bg-pink-50/50 border border-pink-100 rounded-2xl p-3 space-y-2.5 text-center">
                                            <label className="text-[10px] text-brand-chocolate font-black block uppercase tracking-wide">
                                                <i className="fa-solid fa-key text-brand-darkpink mr-1"></i> රිසිට්පත එවා ලැබුණු Passcode එක ඇතුළත් කරන්න
                                            </label>

                                            <div className="flex flex-col gap-2">
                                                <input
                                                    type="text"
                                                    id="dailyPromoInput"
                                                    placeholder="Passcode එක මෙතන ගහන්න..."
                                                    className="w-full px-3 py-2 border border-pink-200 rounded-xl text-xs focus:outline-none focus:border-brand-pink text-center uppercase font-bold tracking-wider bg-white shadow-inner"
                                                />
                                                <button
                                                    onClick={async (e) => {
                                                        const inputVal = document.getElementById('dailyPromoInput').value.trim().toUpperCase();
                                                        const errorBox = document.getElementById('promoErrorBox');
                                                        const successBox = document.getElementById('promoSuccessBox');
                                                        const btn = e.currentTarget;

                                                        if (!inputVal) return;

                                                        try {
                                                            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> පරීක්ෂා කරමින්...';

                                                            // Firebase එකෙන් Code එක තියෙනවද සහ පාවිච්චි කරලා නැද්ද බලනවා
                                                            const docRef = db.collection("activation_codes").doc(inputVal);
                                                            const docSnap = await docRef.get();

                                                            if (docSnap.exists && docSnap.data().isUsed === false) {
                                                                // Code එක හරියටම මැච් වුණා නම්, ඒක පාවිච්චි කරා කියලා Update කරනවා
                                                                await docRef.update({ isUsed: true });

                                                                errorBox.classList.add('hidden');
                                                                successBox.classList.remove('hidden');

                                                                // LocalStorage එකේ Save කරනවා
                                                                localStorage.setItem('isProUser', 'true');

                                                                setTimeout(() => {
                                                                    setIsSubscribed(true);
                                                                    setShowPaywall(false);
                                                                    btn.innerHTML = 'ඇතුළු වන්න';
                                                                }, 2000);
                                                            } else {
                                                                // වැරදි හෝ පාවිච්චි කරපු Code එකක් නම්
                                                                successBox.classList.add('hidden');
                                                                errorBox.classList.remove('hidden');
                                                                btn.innerHTML = 'ඇතුළු වන්න';
                                                            }
                                                        } catch (error) {
                                                            console.error("Firebase Error: ", error);
                                                            errorBox.classList.remove('hidden');
                                                            btn.innerHTML = 'ඇතුළු වන්න';
                                                        }
                                                    }}
                                                    className="w-full bg-brand-darkpink text-white font-black text-xs py-2.5 rounded-xl active:scale-95 transition-all shadow-md block text-center"
                                                >
                                                    ඇතුළු වන්න
                                                </button>
                                            </div>

                                            {/* ❌ Custom Error Box */}
                                            <div id="promoErrorBox" className="hidden bg-red-50 border border-red-200 rounded-xl p-2.5 text-left flex items-start gap-2.5 animate-fade-in">
                                                <i className="fa-solid fa-circle-xmark text-red-500 text-sm mt-0.5 flex-shrink-0"></i>
                                                <p className="text-[11px] text-red-900 leading-tight font-medium">
                                                    <strong>වැරදි Passcode එකක්!</strong> කරුණාකර රිසිට්පත ලබාදී අද දිනට වලංගු නිවැරදිම Passcode එක ලබාගන්න.
                                                </p>
                                            </div>

                                            {/*  Custom Success Box */}
                                            <div id="promoSuccessBox" className="hidden bg-emerald-50 border border-emerald-200 rounded-xl p-2.5 text-left flex items-start gap-2.5 animate-fade-in">
                                                <i className="fa-solid fa-circle-check text-emerald-500 text-sm mt-0.5 flex-shrink-0"></i>
                                                <p className="text-[11px] text-emerald-900 leading-tight font-medium">
                                                    <strong>Passcode එක නිවැරදියි!</strong> ස්තූතියි මවක් විදිහට අප කෙරෙහි තැබූ විශ්වාසයට. PRO විශේෂාංග දැන් සක්‍රීය වේ...
                                                </p>
                                            </div>
                                        </div>

                                        {/* Security Microcopy */}
                                        <span className="text-[8px] text-gray-400 text-center block font-medium pt-1">
                                            <i className="fa-solid fa-lock text-[8px] mr-0.5"></i> Secure Verification System
                                        </span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}

                    {/* 🏥 Friendly Medical Disclaimer */}
                    {!['home', 'names', 'gender', 'music'].includes(activeTab) && (
                        <div className="bg-red-50/60 border border-red-100 rounded-2xl p-4 mt-2 select-none mx-5 mb-6">
                            <p className="text-[11px] text-red-700 leading-relaxed font-medium">
                                <i className="fa-solid fa-circle-exclamation mr-1 text-xs"></i> <strong>සෞඛ්‍ය උපදේශය:</strong> මෙහි අඩංගු සියලුම ලිපි සහ උපදෙස් මූලික අවබෝධය සඳහා පමණි. යම් වෛද්‍ය ගැටලුවකදී වහාම ඔබේ පවුල් සෞඛ්‍ය සේවා නිලධාරිනිය හෝ වෛද්‍යවරයා හමුවන්න.
                            </p>
                        </div>
                    )}

                    {/* 🌸 BOTTOM NAVIGATION BAR */}
                    <nav className="fixed bottom-0 max-w-[450px] w-full bg-white/70 backdrop-blur-lg border-t border-pink-100/40 flex py-3 justify-around items-center z-10 shadow-[0_-5px_20px_rgba(0,0,0,0.02)] rounded-t-3xl">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 text-[10px] font-black tracking-wide transition-all ${activeTab === 'home' ? 'text-brand-darkpink scale-105' : 'text-brand-slate opacity-70 hover:opacity-100'}`}>
                            <i className="fa-solid fa-house text-base"></i>
                            <span>මුල් පිටුව</span>
                        </button>
                        <button onClick={() => setActiveTab('strips')} className={`flex flex-col items-center gap-1 text-[10px] font-black tracking-wide transition-all ${activeTab === 'strips' ? 'text-brand-darkpink scale-105' : 'text-brand-slate opacity-70 hover:opacity-100'}`}>
                            <i className="fa-solid fa-vial-virus text-base"></i>
                            <span>Strips</span>
                        </button>
                        <button onClick={() => setActiveTab('names')} className={`flex flex-col items-center gap-1 text-[10px] font-black tracking-wide transition-all ${activeTab === 'names' ? 'text-brand-darkpink scale-105' : 'text-brand-slate opacity-70 hover:opacity-100'}`}>
                            <i className="fa-solid fa-address-book text-base"></i>
                            <span>ළදරු නම්</span>
                        </button>
                        <button onClick={() => handlePremiumClick('tracker')} className={`flex flex-col items-center gap-1 text-[10px] font-black tracking-wide transition-all ${activeTab === 'tracker' ? 'text-brand-darkpink scale-105' : 'text-brand-slate opacity-70 hover:opacity-100'}`}>
                            <i className="fa-solid fa-calendar-week text-base"></i>
                            <span>Tracker</span>
                        </button>
                    </nav>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
